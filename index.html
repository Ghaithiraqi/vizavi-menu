<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizavi Cafe & Restaurant | QR Menü</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="splash-screen" id="splashScreen" aria-hidden="true">
      <div class="splash-logo">
        <img src="./images/logo.svg" alt="Vizavi Cafe & Restaurant logosu" id="splashLogo">
        <span aria-hidden="true">Vizavi</span>
      </div>
      <p>Hoş Geldiniz</p>
    </div>

    <header class="luxury-hero" id="top">
      <div class="hero-slider" id="heroSlider" aria-label="Vizavi lezzet görselleri">
        <div class="hero-slides" id="heroSlides"></div>
        <div class="slider-dots" id="heroDots" aria-label="Görsel seçimi"></div>
      </div>

      <div class="hero-panel">
        <div class="hero-logo-wrap">
          <div class="hero-logo">
            <!-- Logoyu değiştirmek için ./images/logo.svg dosyasını kendi Vizavi logonuzla değiştirin. -->
            <img src="./images/logo.svg" alt="Vizavi Cafe & Restaurant logosu" id="brandLogo">
            <span aria-hidden="true">Vizavi</span>
          </div>
        </div>
        <p class="hero-kicker">Kafe & Restoran</p>
        <h1>Vizavi Cafe & Restaurant</h1>
        <p class="hero-slogan">Lezzetin En Doğal Hali</p>
        <p class="hero-copy">Geleneksel tarifler, taze malzemeler ve unutulmaz bir deneyim.</p>
        <button class="hero-button" type="button" id="exploreMenu">Menüyü Keşfet</button>
      </div>
    </header>

    <nav class="category-shell" id="categoryShell" aria-label="Menü kategorileri">
      <div class="category-bar" id="categoryBar"></div>
    </nav>

    <main class="menu-page" id="menuContent">
      <div class="menu-intro" aria-hidden="true">
        <span></span>
        <strong>Menü</strong>
        <span></span>
      </div>
      <div class="menu-sections" id="menuSections"></div>
    </main>

    <div class="modal" id="dishModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <section class="dish-sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="close-button" type="button" aria-label="Kapat" data-close-modal>
          <span aria-hidden="true">&times;</span>
        </button>

        <button class="modal-image-wrap image-frame is-loading" type="button" id="modalImageButton" aria-label="Görseli büyüt">
          <img id="modalImage" alt="">
          <div class="image-fallback" id="modalFallback" aria-hidden="true"></div>
        </button>

        <div class="modal-content">
          <p class="modal-label">Lezzet Detayı</p>
          <h2 id="modalTitle"></h2>
          <p class="modal-description" id="modalShortDescription"></p>

          <div class="detail-panel">
            <div class="detail-block">
              <h3>İçindekiler</h3>
              <ul id="modalIngredients"></ul>
            </div>

            <div class="detail-block">
              <h3>Alerjen Bilgisi</h3>
              <ul id="modalAllergens"></ul>
            </div>
          </div>

          <div class="price-block">
            <span>Fiyat</span>
            <strong id="modalPrice"></strong>
          </div>
        </div>
      </section>
    </div>

    <div class="image-preview" id="imagePreview" aria-hidden="true">
      <div class="preview-backdrop" data-close-preview></div>
      <button class="preview-close" type="button" aria-label="Görseli kapat" data-close-preview>&times;</button>
      <div class="preview-frame image-frame" id="previewFrame" data-fallback="V">
        <img id="previewImage" alt="">
      </div>
    </div>
  </body>
</html>
